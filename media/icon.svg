<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Window frame - less padding, smaller radius -->
  <rect x="1" y="2" width="22" height="20" rx="2" stroke="#C5C5C5" stroke-width="1.5" fill="none"/>
  <!-- Title bar line -->
  <line x1="1" y1="6.5" x2="23" y2="6.5" stroke="#C5C5C5" stroke-width="1.5"/>
  <!-- Terminal prompt > -->
  <path d="M5 10.5L10 14L5 17.5" stroke="#C5C5C5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <line x1="12.5" y1="17.5" x2="19" y2="17.5" stroke="#C5C5C5" stroke-width="2" stroke-linecap="round"/>
</svg>
